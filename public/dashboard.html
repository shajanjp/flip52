<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flip 52</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen p-8 transition-colors duration-300">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-gray-800 dark:text-white">Room Dashboard</h1>
                <p id="last-updated" class="text-xs text-gray-500 mt-1 uppercase font-bold tracking-widest">Connecting...</p>
            </div>
            <a href="/" class="text-blue-500 hover:text-blue-600 font-bold transition-colors">&larr; Back to Game</a>
        </header>

        <div class="bg-white dark:bg-gray-900 rounded-2xl shadow-xl overflow-hidden border border-gray-100 dark:border-gray-800">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 dark:bg-gray-800 border-b border-gray-100 dark:border-gray-700">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Room ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Host Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Players</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">State</th>
                    </tr>
                </thead>
                <tbody id="rooms-tbody" class="divide-y divide-gray-100 dark:divide-gray-800">
                    <!-- Rooms will be loaded here -->
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading rooms...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchRooms() {
            try {
                const response = await fetch('/api/rooms');
                const data = await response.json();
                
                let rooms = [];
                let timestamp = Date.now();

                if (Array.isArray(data)) {
                    rooms = data;
                } else if (data && Array.isArray(data.rooms)) {
                    rooms = data.rooms;
                    timestamp = data.timestamp || timestamp;
                } else {
                    console.error('Unexpected response format:', data);
                    return;
                }

                const tbody = document.getElementById('rooms-tbody');
                document.getElementById('last-updated').innerText = `Last Updated: ${new Date(timestamp).toLocaleTimeString()}`;
                
                if (rooms.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="4" class="px-6 py-8 text-center text-gray-500">No active rooms found.</td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = '';
                rooms.forEach(room => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors";
                    
                    const playersHtml = room.players.map(p => `
                        <div class="flex items-center gap-1.5 px-3 py-1 rounded-full border text-xs font-semibold whitespace-nowrap shadow-sm mr-2 mb-2 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 border-gray-200 dark:border-gray-700">
                            <div class="w-1.5 h-1.5 rounded-full ${p.online ? 'bg-green-400 shadow-[0_0_4px_rgba(74,222,128,0.5)]' : 'bg-gray-300 dark:bg-gray-600'}"></div>
                            <span class="max-w-[80px] truncate">${p.name}</span>
                        </div>
                    `).join('');

                    const stateColor = room.state === 'WAITING' ? 'text-green-500' : 'text-yellow-500';

                    tr.innerHTML = `
                        <td class="px-6 py-4 font-mono font-bold text-blue-600 dark:text-blue-400">${room.roomId}</td>
                        <td class="px-6 py-4 font-medium">${room.hostName}</td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap max-w-md">${playersHtml}</div>
                        </td>
                        <td class="px-6 py-4 text-sm">
                            <span class="font-bold ${stateColor}">${room.state}</span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Error fetching rooms:', error);
                document.getElementById('rooms-tbody').innerHTML = `
                    <tr>
                        <td colspan="4" class="px-6 py-8 text-center text-red-500">Failed to load rooms.</td>
                    </tr>
                `;
            }
        }

        fetchRooms();
        // Refresh every 3 seconds
        setInterval(fetchRooms, 30000);

        // Dark mode support matching index.html
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
