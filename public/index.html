<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Flip 52</title>

    <!-- Icons -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Flip 52 - Multiplayer Card Table">
    <meta property="og:description" content="A minimal, real-time card table for playing with friends.">
    <meta property="og:image" content="assets/og-image.png">
    <meta property="og:url" content="https://flip52.app">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card {
            width: 54px;
            height: 75px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card.selected {
            outline: 3px solid #3b82f6;
            transform: translateY(-5px);
            z-index: 10;
        }
        .suit-S, .suit-C { color: black; }
        .suit-H, .suit-D { color: red; }
        
        .table-area {
            min-height: 150px;
            background-color: #065f46;
            border-radius: 8px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(54px, 1fr));
            gap: 8px;
            justify-items: center;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <!-- Login/Join Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-black bg-opacity-60 backdrop-blur-md flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-80 border border-gray-100">
            <h2 class="text-2xl font-black mb-6 text-gray-800 text-center">Flip 52</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Your Name</label>
                    <input id="player-name" type="text" placeholder="Enter name..." class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-500 transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Room ID (Optional)</label>
                    <input id="room-id" type="text" placeholder="ABCD" class="w-full border-2 border-gray-100 p-3 rounded-xl outline-none focus:border-blue-500 transition-colors uppercase">
                </div>
                <button id="btn-join" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Join Game
                </button>
            </div>
        </div>
    </div>

    <!-- Room Header -->
    <header class="bg-white shadow sticky top-0 z-30">
        <div class="px-4 py-2 flex justify-between items-center border-b border-gray-50">
            <div class="flex items-center gap-4">
                <span class="font-black text-lg tracking-tighter text-blue-600">Flip 52</span>
                <div class="flex items-center gap-1.5 border-l pl-3 border-gray-100">
                    <span class="text-[9px] font-bold text-gray-400 uppercase tracking-wider">Room</span>
                    <span id="display-room-id" class="font-mono bg-gray-50 px-2 py-0.5 rounded cursor-pointer hover:bg-gray-100 text-xs border border-gray-100" title="Click to copy link">------</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-start" class="hidden bg-green-500 hover:bg-green-600 text-white px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest shadow-sm active:scale-95 transition-all">Start</button>
            </div>
        </div>
        <div id="player-list" class="flex gap-2 overflow-x-auto whitespace-nowrap px-4 py-2 no-scrollbar bg-gray-50/50 items-center min-h-[44px] transition-all duration-300 ease-in-out">
            <!-- Players as chips here -->
        </div>
    </header>

    <!-- Table Area -->
    <main class="p-4 flex-1">
        <div class="table-area p-4 card-grid" id="table-cards">
            <!-- Table cards here -->
        </div>
    </main>

    <!-- My Hand -->
    <section class="bg-gray-200 p-4 border-t border-gray-300">
        <div id="my-hand" class="card-grid">
            <!-- My cards here -->
        </div>
    </section>

    <!-- Action Bar -->
    <nav class="bg-white border-t p-4 flex justify-around gap-2 sticky bottom-0 z-20">
        <button id="btn-play" class="flex-1 bg-blue-500 text-white py-2 rounded font-bold disabled:opacity-50">Play</button>
        <button id="btn-take" class="flex-1 bg-yellow-500 text-white py-2 rounded font-bold disabled:opacity-50">Take</button>
        <button id="btn-discard" class="flex-1 bg-red-500 text-white py-2 rounded font-bold disabled:opacity-50">Discard</button>
    </nav>

    <!-- Chat Components -->
    <div class="fixed bottom-24 right-4 z-50 pointer-events-none">
        <!-- Chat Popup -->
        <div id="chat-popup" class="absolute bottom-20 right-0 w-80 h-96 bg-white rounded-lg shadow-2xl flex flex-col hidden border border-gray-200 pointer-events-auto">
            <div class="bg-blue-600 text-white p-3 rounded-t-lg flex justify-between items-center">
                <span class="font-bold">Chat</span>
                <button id="chat-close" class="hover:text-gray-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-3 text-sm bg-white">
                <!-- Chat messages here -->
            </div>
            <div class="flex border-t p-2 bg-gray-50 rounded-b-lg">
                <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 p-2 border rounded-l outline-none focus:ring-1 focus:ring-blue-500">
                <button id="btn-send" class="bg-blue-600 text-white px-4 py-2 rounded-r hover:bg-blue-700 transition-colors">Send</button>
            </div>
        </div>

        <!-- Chat Toggle Icon -->
        <button id="chat-toggle" class="absolute bottom-0 right-0 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg hover:bg-blue-700 transition-colors flex items-center justify-center pointer-events-auto">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
            <span id="chat-badge" class="absolute top-0 right-0 block h-4 w-4 rounded-full bg-red-500 border-2 border-white hidden"></span>
        </button>
    </div>

    <script src="assets/app.js"></script>
</body>
</html>
